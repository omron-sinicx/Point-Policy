services:
  dev:
    hostname: point-policy
    runtime: nvidia
    privileged: true
    environment:
      # Pass host user information.
      - HOST_USER=${USER}
      # Display X Server GUI.
      - DISPLAY
      - QT_X11_NO_MITSHM=1
      # Configure Nvidia Docker interface.
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DOCKER_RUNTIME=nvidia
    image: point_policy:latest
    build:
      context: ../
      dockerfile: ./docker/dev/Dockerfile
      args:
        - DOCKERFILE_COMMIT_SHORT_SHA
    volumes:
      # Mount the full repository so edits on the host are reflected immediately.
      - ../:/root/Point-Policy/
      # Grant display access to X Server.
      - /tmp/.X11-unix:/tmp/.X11-unix
      # Grant access to USB devices (RealSense cameras, etc.).
      - /dev/:/dev/
      - /media/:/media/
    network_mode: host
    extra_hosts:
      - "point-policy:127.0.0.1"
    command: /root/Point-Policy/docker/dev/scripts/initialize-docker-container.sh
    shm_size: 1g
